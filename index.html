<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', 'Segoe UI', sans-serif; }
  @media print {
    .no-print { display: none !important; }
    .sidebar { display: none !important; }
    .main-area { padding: 0 !important; }
  }
  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { display: none !important; }
    .sidebar-toggle { display: flex !important; }
    .sidebar.open { display: flex !important; position: fixed; top: 0; left: 0; z-index: 100; height: 100vh; width: 260px; box-shadow: 4px 0 24px rgba(0,0,0,.15); }
    .sidebar-overlay { display: block !important; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 99; }
    .main-area { padding: 52px 10px 14px !important; }
    .cal-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
    .cal-scroll-inner { min-width: 700px; }
    .top-bar { flex-direction: row; align-items: center; gap: 8px; }
    .top-bar h1 { font-size: 20px !important; }
    .top-bar-sub { display: none !important; }
    .day-detail { padding: 14px !important; }
  }
  @media (min-width: 769px) {
    .sidebar-toggle { display: none !important; }
    .sidebar-overlay { display: none !important; }
  }
  /* Portrait rotate hint — only shows on portrait mobile */
  .rotate-hint { display: none; }
  @media screen and (orientation: portrait) and (max-width: 768px) {
    .rotate-hint { display: flex !important; }
  }
</style>

function loadSaved(){try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY));if(d&&d.profile&&d.profile.name)return d;return null;}catch(e){return null;}}
function saveToDisk(profile,events,email){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({profile,events,email:email||'',savedAt:new Date().toISOString()}));}catch(e){console.warn("Save failed",e);}}

function normalizeProfile(prof){const def={name:"",grade:"10",subs:[],extras:[],tutoring:[],commits:[],routines:DEFAULT_ROUTINES.map(r=>({...r,enabled:true}))};return{...def,...prof,subs:prof?.subs||[],extras:prof?.extras||[],tutoring:prof?.tutoring||[],commits:prof?.commits||[],routines:prof?.routines||def.routines};}
function getSubs(grade){const g=parseInt(grade);if(g<=9)return[{title:"Compulsory Subjects (all required)",items:SENIOR.compulsory,req:true},{title:"Additional Language (optional)",items:SENIOR.languages,req:false}];return[{title:"Compulsory Subjects",items:FET.compulsory,req:true},{title:"First Additional Language (choose one)",items:FET.fal,req:true,radio:true},{title:"Mathematics (choose one)",items:FET.math,req:true,radio:true},{title:"Elective Subjects (choose 3–4)",items:FET.electives,req:false},{title:"Additional Language (optional)",items:FET.languages,req:false}];}
const CATS=[{key:"school",label:"School",border:B.berry,bg:B.powderLight},{key:"exam",label:"Exam / Test",border:B.red,bg:B.redLight},{key:"assessment",label:"Assessment",border:"#7B3FA0",bg:"#F4EDFA"},{key:"project",label:"Project / Due Date",border:"#D4850A",bg:"#FEF5E7"},{key:"extra",label:"Extracurricular",border:"#2D8A6F",bg:"#E5F5E8"},{key:"tutor",label:"Extra Tutoring",border:B.coral,bg:"#FFF3F0"},{key:"commit",label:"Life Commitment",border:B.honey,bg:B.honeyLight},{key:"routine",label:"Daily Routine",border:"#8B8B8B",bg:"#F3F3F0"},{key:"study",label:"Study",border:B.berry,bg:B.berryLight},{key:"free",label:"Free Time",border:"#CCC",bg:B.greyLight}];
const CM=Object.fromEntries(CATS.map(c=>[c.key,c]));
const STEPS=6;

function App(){
  const saved=useRef(loadSaved()).current;
  const[step,setStep]=useState(saved?STEPS:0);
  const[p,setP]=useState(saved?normalizeProfile(saved.profile):{name:"",grade:"10",subs:[],extras:[],tutoring:[],commits:[],routines:DEFAULT_ROUTINES.map(r=>({...r,enabled:true}))});
  const[mo,setMo]=useState(new Date().getMonth());
  const[yr,setYr]=useState(new Date().getFullYear());
  const[evts,setEvts]=useState(saved?saved.events||{}:{});
  const[sel,setSel]=useState(null);
  const[showF,setShowF]=useState(false);
  const[f,setF]=useState({title:"",cat:"study",time:"09:00",notes:""});
  const[eIdx,setEIdx]=useState(null);
  const[tmp,setTmp]=useState("");
  const[tmp2,setTmp2]=useState("");
  const[tmpC,setTmpC]=useState({name:"",day:"Saturday"});
  const[newR,setNewR]=useState({name:"",time:"12:00"});
  const[customSub,setCustomSub]=useState("");
  const[showWelcome,setShowWelcome]=useState(!saved);
  const[showPreteach,setShowPreteach]=useState(!saved);
  const[authed,setAuthed]=useState(false);
  const[authLoading,setAuthLoading]=useState(false);
  const[authErr,setAuthErr]=useState('');
  const[loginForm,setLoginForm]=useState({firstName:'',surname:'',email:''});
  const[supId,setSupId]=useState(null);
  const[userEmail,setUserEmail]=useState('');

  useEffect(()=>{
    if(step>=STEPS&&p.name){
      saveToDisk(p,evts,userEmail);
      if(supId){supa.from('planners').update({profile:p,events:evts,updated_at:new Date().toISOString()}).eq('id',supId).then(({error})=>{if(error)console.warn('Supabase sync failed',error);});}
    }
  },[p,evts,step,supId,userEmail]);
  const[sideOpen,setSideOpen]=useState(false);
  const[showExport,setShowExport]=useState(false);
  const[exporting,setExporting]=useState(false);
  const calRef=useRef(null);
  const exportRef=useRef(null);

  // Escape key closes day panel, add-event form, export dropdown, mobile sidebar
  useEffect(()=>{
    const onKey=(e)=>{if(e.key==="Escape"){setSel(null);setShowF(false);setShowExport(false);setSideOpen(false);}};
    document.addEventListener("keydown",onKey);
    return()=>document.removeEventListener("keydown",onKey);
  },[]);

  // Click outside export dropdown closes it
  useEffect(()=>{
    const onClick=(e)=>{if(exportRef.current&&!exportRef.current.contains(e.target))setShowExport(false);};
    document.addEventListener("mousedown",onClick);
    return()=>document.removeEventListener("mousedown",onClick);
  },[]);

  const loginOrRegister=async()=>{
    const{firstName,surname,email}=loginForm;
    if(!firstName.trim()||!surname.trim()||!email.trim())return setAuthErr('Please fill in all fields.');
    const emailLower=email.toLowerCase().trim();
    if(!emailLower.endsWith('@mysbf.co.za'))return setAuthErr('Please use your @mysbf.co.za email address.');
    setAuthLoading(true);setAuthErr('');
    try{
      // Fast path: check localStorage cache first
      const cached=loadSaved();
      if(cached&&cached.email===emailLower&&cached.profile?.name?.toLowerCase()===firstName.trim().toLowerCase()){
        setP(normalizeProfile(cached.profile));setEvts(cached.events||{});
        setStep(cached.profile.subs?.length?STEPS:0);
        setShowPreteach(!cached.profile.subs?.length);setShowWelcome(false);
        setUserEmail(emailLower);setAuthed(true);setAuthLoading(false);
        // Grab supId in background for future saves
        supa.from('planners').select('id').eq('email',emailLower).single().then(({data})=>{if(data)setSupId(data.id);});
        return;
      }
      // Full Supabase lookup
      const{data,error}=await supa.from('planners').select('*').eq('email',emailLower).single();
      if(error&&error.code!=='PGRST116')throw error;
      if(data){
        // Returning user — verify name
        if(data.first_name.toLowerCase()!==firstName.trim().toLowerCase()||data.surname.toLowerCase()!==surname.trim().toLowerCase()){
          setAuthErr("Those details don't match our records. Please check your name and email.");
          setAuthLoading(false);return;
        }
        setP(normalizeProfile(data.profile||{name:firstName.trim()}));
        setEvts(data.events||{});setSupId(data.id);
        const hasProfile=data.profile?.subs?.length>0;
        setStep(hasProfile?STEPS:0);setShowPreteach(!hasProfile);setShowWelcome(false);
        setUserEmail(emailLower);
        saveToDisk(data.profile,data.events||{},emailLower);
      }else{
        // New user — create record
        const defaultProfile={name:firstName.trim(),grade:'10',subs:[],extras:[],tutoring:[],commits:[],routines:DEFAULT_ROUTINES.map(r=>({...r,enabled:true}))};
        const{data:newRow,error:createErr}=await supa.from('planners').insert({
          first_name:firstName.trim(),surname:surname.trim(),email:emailLower,
          profile:defaultProfile,events:{}
        }).select('id').single();
        if(createErr)throw createErr;

  /* ── MAIN PLANNER ── */
  const dim=new Date(yr,mo+1,0).getDate();
  const first=(()=>{let x=new Date(yr,mo,1).getDay();return x===0?6:x-1;})();
  const cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);while(cells.length%7)cells.push(null);
  const td=new Date();const isT=d=>d&&td.getDate()===d&&td.getMonth()===mo&&td.getFullYear()===yr;
  const pM=()=>{if(mo===0){setMo(11);setYr(yr-1);}else setMo(mo-1);setSel(null);};
  const nM=()=>{if(mo===11){setMo(0);setYr(yr+1);}else setMo(mo+1);setSel(null);};
  const qi=[...p.subs.map(s=>({l:s,cat:"school",border:B.berry,bg:B.powderLight,color:B.berry})),...p.extras.map(a=>({l:a,cat:"extra",border:"#2D8A6F",bg:"#E5F5E8",color:"#2D7A5F"})),...p.tutoring.map(t=>({l:t,cat:"tutor",border:B.coral,bg:"#FFF3F0",color:"#C04020"})),...p.commits.map(c=>({l:c.name,cat:"commit",border:B.honey,bg:B.honeyLight,color:"#8B6914"})),...p.routines.filter(r=>r.enabled).map(r=>({l:r.name,cat:"routine",border:"#8B8B8B",bg:"#F3F3F0",color:"#555"}))];

  return(
    <div style={{display:"flex",minHeight:"100vh",background:"#FAFAF7",fontFamily:"'DM Sans','Segoe UI',sans-serif"}}>
      <WelcomePopup/>
      {/* MOBILE SIDEBAR TOGGLE */}
      <button className="sidebar-toggle" onClick={()=>setSideOpen(!sideOpen)} style={{display:"none",position:"fixed",top:12,left:12,zIndex:101,width:38,height:38,borderRadius:10,border:`1.5px solid ${B.grey}`,background:"#fff",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.1)"}}>{sideOpen?"✕":"☰"}</button>
      {sideOpen&&<div className="sidebar-overlay" onClick={()=>setSideOpen(false)}/>}
      {/* SIDEBAR */}
      <div className={`sidebar${sideOpen?" open":""}`} style={{width:220,background:"#fff",borderRight:`1px solid ${B.grey}`,padding:"18px 14px",display:"flex",flexDirection:"column",overflowY:"auto",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,paddingBottom:14,borderBottom:`1px solid ${B.grey}`}}>
          <Lg s={34}/>
          <div>
            <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:14,color:B.berry}}>{p.name}'s Planner</div>
            <div style={{fontSize:11,color:"#999"}}>Grade {p.grade} · {isSP?"Senior Phase":"FET"}</div>
          </div>
        </div>
        {[{l:"Subjects",it:p.subs,b:B.berry,bg:B.powderLight},{l:"Activities",it:p.extras,b:"#2D8A6F",bg:"#E5F5E8"},{l:"Extra Tutoring",it:p.tutoring,b:B.coral,bg:"#FFF3F0"}].map(sec=>sec.it.length>0&&<div key={sec.l} style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:600,color:"#AAA",textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>{sec.l}</div>
          {sec.it.map(it=><div key={it} style={{display:"flex",alignItems:"center",gap:7,padding:"2px 0"}}><span style={{width:10,height:10,borderRadius:"50%",background:sec.bg,border:`2px solid ${sec.b}`,flexShrink:0}}/><span style={{fontSize:11}}>{it}</span></div>)}
        </div>)}
        {p.commits.length>0&&<div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:600,color:"#AAA",textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>Commitments</div>
          {p.commits.map((c,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:7,padding:"2px 0"}}><span style={{width:10,height:10,borderRadius:"50%",background:B.honeyLight,border:`2px solid ${B.honey}`,flexShrink:0}}/><span style={{fontSize:11}}>{c.name}</span></div>)}
        </div>}
        {p.routines.filter(r=>r.enabled).length>0&&<div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:600,color:"#AAA",textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>Daily Routines</div>
          {p.routines.filter(r=>r.enabled).map((r,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:7,padding:"2px 0"}}><span style={{fontSize:12}}>{r.icon}</span><span style={{fontSize:11}}>{r.name} <span style={{opacity:.4,fontSize:9}}>{r.time}</span></span></div>)}
        </div>}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:600,color:"#AAA",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Colour Key</div>
          {CATS.map(c=><div key={c.key} style={{display:"flex",alignItems:"center",gap:6,padding:"2px 0"}}><span style={{width:13,height:13,borderRadius:3,background:c.bg,border:`2px solid ${c.border}`,flexShrink:0}}/><span style={{fontSize:10}}>{c.label}</span></div>)}
        </div>
        <div style={{marginTop:"auto",paddingTop:14,borderTop:`1px solid ${B.grey}`}}>
          <button className="no-print" style={{...st.sec,width:"100%",fontSize:11,marginBottom:6}} onClick={()=>setStep(0)}>✏️ Edit Profile</button>
          <button className="no-print" style={{...st.sec,width:"100%",fontSize:11,color:"#C04020",borderColor:"#F5C0B0"}} onClick={reset}>🗑 Reset Planner</button>
        </div>
      </div>

      {/* MAIN */}
      <div className="main-area" style={{flex:1,padding:"22px 26px",overflowY:"auto"}}>
        <div className="top-bar" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <h1 style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:28,color:B.berry,margin:0}}>{MO[mo]} {yr}</h1>
            <p className="top-bar-sub" style={{fontSize:12,color:"#999",margin:"3px 0 0"}}>{p.name}'s Monthly Planner — Grade {p.grade} · Students for a Better Future</p>
          </div>
          <div className="no-print" style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
            <div ref={exportRef} style={{position:"relative"}}>
              <button style={{...st.btn,display:"flex",alignItems:"center",gap:6,padding:"10px 18px"}} onClick={()=>setShowExport(!showExport)} disabled={exporting}>{exporting?"⏳ Exporting...":"💾 Save & Export"}</button>
              {showExport&&<div style={{position:"absolute",right:0,top:"110%",background:"#fff",borderRadius:12,border:`1.5px solid ${B.grey}`,boxShadow:"0 6px 24px rgba(0,0,0,.1)",padding:6,zIndex:50,minWidth:160}}>
                <button style={{...st.sec,width:"100%",textAlign:"left",marginBottom:4,border:"none",borderRadius:8,padding:"10px 14px"}} onClick={()=>exportAs("jpeg")}>🖼 Save as JPEG</button>
                <button style={{...st.sec,width:"100%",textAlign:"left",marginBottom:4,border:"none",borderRadius:8,padding:"10px 14px"}} onClick={()=>exportAs("pdf")}>📄 Save as PDF</button>
                <button style={{...st.sec,width:"100%",textAlign:"left",border:"none",borderRadius:8,padding:"10px 14px"}} onClick={()=>{setShowExport(false);window.print();}}>🖨 Print</button>
              </div>}
            </div>
            <p style={{fontSize:12,color:"#2D3B6B",textAlign:"right",margin:0,maxWidth:200,lineHeight:1.5,fontWeight:500}}>Done? Save & Export — then come back any time to add or edit your plan.</p>
          </div>
        </div>
        <div className="no-print" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:12}}>
          <button style={st.navB} onClick={pM}>‹</button>
          <span style={{fontWeight:600,fontSize:15,fontFamily:"'DM Serif Display',Georgia,serif",color:B.berry}}>{MO[mo]} {yr}</span>
          <button style={st.navB} onClick={nM}>›</button>
          {(mo!==new Date().getMonth()||yr!==new Date().getFullYear())&&<button style={{...st.sec,fontSize:11,padding:"6px 12px"}} onClick={()=>{setMo(new Date().getMonth());setYr(new Date().getFullYear());setSel(null);}}>Today</button>}
        </div>
        <div ref={calRef} style={{background:"#fff",borderRadius:16,padding:18,border:`1px solid ${B.grey}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingBottom:10,borderBottom:`2px solid ${B.red}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Lg s={30}/>
              <div>
                <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:17,color:B.berry}}>{p.name}'s Monthly Planner</div>
                <div style={{fontSize:10,color:"#999"}}>Students for a Better Future — Grade {p.grade}</div>
              </div>
            </div>
            <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:15,color:B.red}}>{MO[mo]} {yr}</div>
          </div>
          {Object.keys(evts).length===0&&<div style={{textAlign:"center",padding:"10px 0 4px",fontSize:13,color:"#AAA"}}>👆 Click any day to add an event</div>}
          <div className="cal-scroll-wrap"><div className="cal-scroll-inner">
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:B.grey,borderRadius:10,overflow:"hidden"}}>
            {DAYS_W.map(d=><div key={d} style={{background:B.berry,color:"#fff",padding:"9px 4px",textAlign:"center",fontSize:11,fontWeight:600}}>{d}</div>)}
            {cells.map((d,i)=>{const de=d?(evts[dk(d)]||[]):[];const wk=(i%7)>=5;return(
              <div key={i} style={{background:!d?"#FAFAF7":sel===d?B.powderLight:isT(d)?"#FFF5F5":wk?"#FDFCF9":"#fff",minHeight:85,padding:5,cursor:d?"pointer":"default",...(sel===d?{boxShadow:`inset 0 0 0 2px ${B.red}`}:{})}} onClick={()=>d&&setSel(d)}>
                {d&&<>
                  <div style={{fontSize:12,fontWeight:600,color:isT(d)?"#fff":B.berry,marginBottom:2,...(isT(d)?{background:B.red,borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}:{})}}>{d}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:1}}>
                    {de.slice(0,3).map((ev,j)=>{const c=CM[ev.cat]||CM.free;return <div key={j} style={{fontSize:9,padding:"1px 4px",borderRadius:3,background:c.bg,borderLeft:`3px solid ${c.border}`,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.5}}><b style={{opacity:.5}}>{ev.time}</b> {ev.title}</div>;})}
                    {de.length>3&&<div style={{fontSize:9,color:"#999"}}>+{de.length-3} more</div>}
                  </div>
                </>}
              </div>
            );})}
          </div>
          </div></div>
          <div style={{marginTop:10,paddingTop:8,borderTop:`1px solid ${B.grey}`,display:"flex",justifyContent:"space-between",flexWrap:"wrap"}}>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{CATS.map(c=><div key={c.key} style={{display:"flex",alignItems:"center",gap:3,fontSize:9}}><span style={{width:11,height:11,borderRadius:3,background:c.bg,border:`2px solid ${c.border}`}}/>{c.label}</div>)}</div>
            <div style={{fontSize:8,color:"#CCC"}}>Students for a Better Future © {yr}</div>
          </div>
        </div>

        {/* ROTATE HINT — portrait mobile only, controlled by CSS */}
        <div className="rotate-hint no-print" style={{position:"fixed",bottom:0,left:0,right:0,background:B.berry,color:"#fff",padding:"12px 18px",alignItems:"center",justifyContent:"center",gap:10,zIndex:150,fontSize:13,fontWeight:500}}>
          <span style={{fontSize:20}}>📱</span>
          <span>Rotate your phone for the best planner view</span>
        </div>

        {/* DAY DETAIL MODAL */}
        {sel&&<div className="no-print" style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={(e)=>{if(e.target===e.currentTarget){setSel(null);setShowF(false);}}}>
          <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:22,color:B.berry,margin:0}}>{DAYS_W[(first+sel-1)%7]} {sel} {MO[mo]}</h3>
              <button style={{...st.navB,fontSize:20,width:32,height:32}} onClick={()=>{setSel(null);setShowF(false);}}>×</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
              {(evts[dk(sel)]||[]).sort((a,b)=>a.time.localeCompare(b.time)).map((ev,i)=>{const c=CM[ev.cat]||CM.free;return(
                <div key={i} style={{padding:"11px 13px",borderRadius:10,background:c.bg,borderLeft:`4px solid ${c.border}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{ev.title}</div>
                      <div style={{fontSize:12,color:"#666",marginTop:2}}>{ev.time} · {c.label}</div>
                      {ev.notes&&<div style={{fontSize:11,color:"#888",marginTop:3,fontStyle:"italic"}}>{ev.notes}</div>}
                    </div>
                    <div style={{display:"flex",gap:4}}>
                      <button style={{background:"none",border:"none",cursor:"pointer",fontSize:13}} onClick={()=>{setF({...ev});setEIdx(i);setShowF(true);}}>✏️</button>
                      <button style={{background:"none",border:"none",cursor:"pointer",fontSize:13}} onClick={()=>rm(sel,i)}>🗑</button>
                    </div>
                  </div>
                </div>
              );})}
              {(!evts[dk(sel)]||!evts[dk(sel)].length)&&<p style={{color:"#CCC",fontSize:13,textAlign:"center",padding:14}}>No events yet — add one below!</p>}
            </div>
            {!showF?<button style={st.btn} onClick={()=>{setShowF(true);setEIdx(null);setF({title:"",cat:"study",time:"09:00",notes:""});}}>+ Add to this day</button>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div>
                <div style={{fontSize:10,fontWeight:600,color:"#AAA",textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>What is it?</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {[
                    {icon:"📝",label:"Test",cat:"exam"},
                    {icon:"📊",label:"Assessment",cat:"assessment"},
                    {icon:"📋",label:"Project Due",cat:"project"},
                    {icon:"📅",label:"Assignment Due",cat:"project"},
                    {icon:"📚",label:"Study Session",cat:"study"},
                    {icon:"🏫",label:"School Event",cat:"school"},
                    {icon:"⚽",label:"Activity",cat:"extra"},
                    {icon:"🌟",label:"Free Time",cat:"free"},
                    {icon:"⏰",label:"Other",cat:"free"},
                  ].map((t,i)=>{const active=f.cat===t.cat&&f.title.startsWith(t.label);const c=CM[t.cat];return(
                    <button key={i} style={{padding:"5px 10px",borderRadius:20,border:`1.5px solid ${active?c.border:B.grey}`,background:active?c.bg:"#fff",color:active?c.border:"#666",fontSize:11,fontWeight:active?600:400,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:4}} onClick={()=>setF({...f,cat:t.cat,title:t.label+": "})}>
                      {t.icon} {t.label}
                    </button>
                  );})}
                </div>
              </div>
              <input style={st.inp} placeholder="Add detail — e.g. Maths Test, History Essay..." value={f.title} onChange={e=>setF({...f,title:e.target.value})} autoFocus/>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <input type="time" style={{...st.inp,flex:1,minWidth:110,marginBottom:0}} value={f.time} onChange={e=>setF({...f,time:e.target.value})}/>
                <select style={{padding:"10px 12px",borderRadius:10,border:`1.5px solid ${B.grey}`,fontSize:13,fontFamily:"'DM Sans',sans-serif",background:"#FAFAF7",flex:1}} value={f.cat} onChange={e=>setF({...f,cat:e.target.value})}>{CATS.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}</select>
              </div>
              <input style={{...st.inp,marginBottom:0}} placeholder="Notes (optional)..." value={f.notes} onChange={e=>setF({...f,notes:e.target.value})}/>
              <div style={{display:"flex",gap:8}}>
                <button style={{...st.btn,flex:1}} onClick={save}>{eIdx!==null?"Update":"Save"}</button>
                <button style={{...st.sec,flex:1}} onClick={()=>{setShowF(false);setEIdx(null);}}>Cancel</button>
              </div>
            </div>}
          </div>
        </div>}
      </div>
    </div>
  );
}

const st={
  wrap:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#FAFAF7 0%,#E6E6E6 100%)",padding:20,fontFamily:"'DM Sans','Segoe UI',sans-serif"},
  card:{background:"#fff",borderRadius:20,padding:"36px 32px",maxWidth:600,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,0.06)",border:"1px solid #E6E6E6"},
  h2:{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:24,color:"#27265F",margin:"0 0 6px"},
  sub:{fontSize:14,color:"#888",margin:"0 0 16px",lineHeight:1.5},
  inp:{width:"100%",padding:"12px 16px",borderRadius:10,border:"1.5px solid #E6E6E6",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",background:"#FAFAF7",boxSizing:"border-box",marginBottom:12},
  btn:{padding:"12px 24px",borderRadius:10,border:"none",background:"#BF1717",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",width:"100%"},
  sec:{padding:"10px 18px",borderRadius:10,border:"1.5px solid #E6E6E6",background:"#fff",color:"#555",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
  nav:{display:"flex",gap:10},
  navB:{width:34,height:34,borderRadius:"50%",border:"1px solid #E6E6E6",background:"#fff",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#27265F",fontFamily:"'DM Sans',sans-serif"}
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
